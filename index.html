<!DOCTYPE html>  
<html>  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Smart Online Exam System</title>  
<style>  
  *{box-sizing:border-box;margin:0;padding:0;}  
  body{font-family:Arial,sans-serif;background:#050816;color:white;padding:16px;min-height:100vh;}  
  .container{max-width:900px;margin:auto;background:#0f172a;padding:24px;border-radius:16px;}  
  h2{text-align:center;font-size:1.4rem;margin-bottom:20px;}  
  h3{margin-bottom:10px;font-size:1rem;}  
  input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #334155;border-radius:8px;background:#1e293b;color:white;font-size:14px;outline:none;}  
  input::placeholder{color:#64748b;}  
  button{width:100%;padding:11px;margin-top:8px;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;}  
  .btn-blue{background:#2563eb;color:white;}  
  .btn-green{background:#22c55e;color:white;}  
  .btn-yellow{background:#f59e0b;color:#111;}  
  .btn-red{background:#ef4444;color:white;}  
  .btn-gray{background:#475569;color:white;}  
  .card{background:#1e293b;padding:14px;margin:8px 0;border-radius:10px;border:1px solid #334155;}  
  #timer{font-size:22px;color:#f87171;font-weight:bold;margin:10px 0;}  
  #progressBar{width:100%;height:8px;background:#334155;border-radius:10px;margin-bottom:12px;}  
  #progress{height:8px;background:#22c55e;border-radius:10px;width:100%;transition:width .5s;}  
  .radio-label{display:flex;align-items:center;gap:8px;padding:7px 0;cursor:pointer;font-size:14px;}  
  .radio-label input{width:auto;margin:0;}  
  .radio-label.disabled {opacity: 0.5; cursor: not-allowed;}
  .warn{background:#7f1d1d;padding:10px;border-radius:8px;margin:8px 0;text-align:center;font-weight:600;}  
  .msg{padding:10px;border-radius:8px;margin:8px 0;font-size:13px;text-align:center;}  
  hr{border:none;border-top:1px solid #334155;margin:16px 0;}  
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;}  
  @media(max-width:500px){.two-col{grid-template-columns:1fr;}}  
  .leaderboard{margin-top:20px;padding:16px;background:#1e293b;border-radius:10px;}  
  .top-rank-1{background: linear-gradient(45deg, #fef08a, #ca8a04); color: #000 !important; border: none;}
  .top-rank-2{background: linear-gradient(45deg, #e2e8f0, #94a3b8); color: #000 !important; border: none;}
  .top-rank-3{background: linear-gradient(45deg, #fed7aa, #c2410c); color: #000 !important; border: none;}
  .q-actions{display: flex; gap: 8px; margin-top: 10px;}
</style>  
</head>  
<body>  
<div class="container">  
  <h2>🏫 GOD++ EXAM SYSTEM</h2>    
  
  <div id="page1">  
    <div class="card">  
      <h3>👨‍🎓 Student Login</h3>  
      <input id="studentName" placeholder="তোমার নাম লেখো">  
      <input id="studentClass" placeholder="তোমার ক্লাস লেখো"> 
      <input type="password" id="studentPass" placeholder="Exam Password (Hint: god++)"> 
      
      <select id="examSubject" onchange="updateChapters('examSubject', 'examChapter')">
        <option value="">-- সাবজেক্ট সিলেক্ট করো --</option>
      </select>
      
      <select id="examChapter">
        <option value="All">All Chapters</option>
      </select>
      
      <button class="btn-blue" onclick="studentLogin()">Exam দিতে চাই ▶</button> 
    </div>
    
    <div class="card" style="margin-top:10px;">  
      <h3>🔐 Teacher Login</h3>  
      <input id="user" placeholder="Username">  
      <input type="password" id="pass" placeholder="Password">  
      <button class="btn-blue" onclick="teacherLogin()">Login</button>  
    </div>  
  </div>    
   
  <div id="page2" style="display:none;">  
    <div class="card">  
      <h3>➕ নতুন প্রশ্ন যোগ করো</h3> 
      <select id="subject" onchange="updateChapters('subject', 'chapter')">
        <option value="">-- সাবজেক্ট সিলেক্ট করো --</option>
      </select>
      
      <select id="chapter">
        <option value="All">All Chapters</option>
      </select>

      <input id="q" placeholder="প্রশ্ন লেখো">

      <div class="two-col">
        <input id="o1" placeholder="Option 1">
        <input id="o2" placeholder="Option 2">
        <input id="o3" placeholder="Option 3">
        <input id="o4" placeholder="Option 4">
      </div>
      
      <select id="correct">  
        <option value="0">✅ Option 1 সঠিক</option>  
        <option value="1">✅ Option 2 সঠিক</option>  
        <option value="2">✅ Option 3 সঠিক</option>  
        <option value="3">✅ Option 4 সঠিক</option>  
      </select>  
      
      <input id="exp" placeholder="উত্তরের ব্যাখ্যা (Optional - কেন এটি সঠিক?)">
      <button class="btn-green" onclick="addQuestion()">প্রশ্ন যোগ করো ✚</button>  
      <div id="qMsg" class="msg" style="display:none;"></div>  
    </div>  
  
    <div class="card">
      <h3>📋 Question List & Filter</h3>
      
      <div class="two-col">
        <select id="filterSubject" onchange="loadQuestions()">
            <option value="All">All Subjects</option>
        </select>
        <input id="searchQuestion" placeholder="🔍 প্রশ্ন খুঁজুন..." onkeyup="loadQuestions()">
      </div>
      
      <div id="questionList" style="margin-top: 10px; max-height: 400px; overflow-y: auto;"></div>
    </div>
    
    <button class="btn-gray" onclick="clearAllQuestions()" style="margin-top:6px;">🗑 সব প্রশ্ন মুছো</button>  
    <br><br>
    
    <div class="card">
      <h3>📊 All Results Search</h3>
      <input id="searchResult" placeholder="🔍 Student Name Search..." onkeyup="loadResults()">
      <div id="allResults" style="margin-top: 10px; max-height: 300px; overflow-y: auto;"></div> 
    </div>
  </div>

  <div id="page3" style="display:none;">  
    <div id="timer">⏱ --</div>  
    <div id="progressBar"><div id="progress"></div></div>  
    <div id="warnDiv"></div>  
    <div id="quiz"></div>  
    <button class="btn-red" onclick="submitExam()">✅ Submit করো</button>  
  </div>    

  <div id="page4" style="display:none;">  
    <div id="result"></div>    
    <div class="leaderboard">  
      <h3>🏆 Exam Leaderboard (Subject/Chapter)</h3>  
      <div id="board">লোড হচ্ছে...</div>  
    </div> 
    <div class="leaderboard">  
      <h3>🌍 Global Points Leaderboard (Overall)</h3>  
      <div id="globalBoard">লোড হচ্ছে...</div>  
    </div>       
    <button class="btn-blue" onclick="show('page1')" style="margin-top:12px;">  
      🔄 Home / আবার Exam দাও  
    </button>  
  </div>  

</div>

<script>  
var DB = "https://exam-bd-b9668-default-rtdb.firebaseio.com";  
var student = "", sClass = "", examQuestions = [], timeLeft = 0, totalTime = 0, timerInterval = null, warn = 0, submitted = false;  

// Comprehensive HSC Subjects and Chapters Mapping
const hscData = {
    "Physics 1st Paper": ["ভৌত জগত ও পরিমাপ", "ভেক্টর", "গতিবিদ্যা", "নিউটনিয়ান বলবিদ্যা", "কাজ, শক্তি ও ক্ষমতা", "মহাকর্ষ ও অভিকর্ষ", "পদার্থের গাঠনিক ধর্ম", "পর্যাবৃত্ত গতি", "তরঙ্গ", "আদর্শ গ্যাস ও গ্যাসের গতিতত্ত্ব"],
    "Physics 2nd Paper": ["তাপগতিবিদ্যা", "স্থির তড়িৎ", "চল তড়িৎ", "তড়িৎ প্রবাহের চৌম্বক ক্রিয়া ও চুম্বকত্ব", "তাড়িতচৌম্বক আবেশ ও পরিবর্তী প্রবাহ", "জ্যামিতিক আলোকবিজ্ঞান", "ভৌত আলোকবিজ্ঞান", "আধুনিক পদার্থবিজ্ঞানের সূচনা", "পরমাণুর মডেল ও নিউক্লিয়ার পদার্থবিজ্ঞান", "সেমিকন্ডাক্টর ও ইলেকট্রনিক্স", "জ্যোতির্বিজ্ঞান"],
    "Chemistry 1st Paper": ["ল্যাবরেটরি নিরাপদ ব্যবহার", "গুণগত রসায়ন", "মৌলের পর্যাবৃত্ত ধর্ম ও রাসায়নিক বন্ধন", "রাসায়নিক পরিবর্তন", "কর্মমুখী রসায়ন"],
    "Chemistry 2nd Paper": ["পরিবেশ রসায়ন", "জৈব রসায়ন", "পরিমাণগত রসায়ন", "তড়িৎ রসায়ন", "অর্থনৈতিক রসায়ন"],
    "Higher Math 1st Paper": ["ম্যাট্রিক্স ও নির্ণায়ক", "ভেক্টর", "সরলরেখা", "বৃত্ত", "বিন্যাস ও সমাবেশ", "ত্রিকোণমিতিক অনুপাত", "সংযুক্ত কোণের ত্রিকোণমিতিক অনুপাত", "ফাংশন ও ফাংশনের লেখচিত্র", "অন্তরীকরণ", "যোগজীকরণ"],
    "Higher Math 2nd Paper": ["বাস্তব সংখ্যা ও অসমতা", "যোগাশ্রয়ী প্রোগ্রামিং", "জটিল সংখ্যা", "বহুপদী ও বহুপদী সমীকরণ", "দ্বিপদী বিস্তৃতি", "কনিক", "বিপরীত ত্রিকোণমিতিক ফাংশন ও ত্রিকোণমিতিক সমীকরণ", "স্থিতিবিদ্যা", "সমতলে বস্তুকণার গতি", "বিস্তার পরিমাপ ও সম্ভাবনা"],
    "Biology 1st Paper": ["কোষ ও এর গঠন", "কোষ বিভাজন", "কোষ রসায়ন", "অণুজীব", "শৈবাল ও ছত্রাক", "ব্রায়োফাইটা ও টেরিডোফাইটা", "নগ্নবীজী ও আবৃতবীজী উদ্ভিদ", "টিস্যু ও টিস্যুতন্ত্র", "উদ্ভিদ শারীরতত্ত্ব", "উদ্ভিদ প্রজনন", "জীবপ্রযুক্তি", "জীবের পরিবেশ ও বিস্তার"],
    "Biology 2nd Paper": ["প্রাণীর বিভিন্নতা ও শ্রেণিবিন্যাস", "প্রাণীর পরিচিতি", "পরিপাক ও শোষণ", "রক্ত ও সঞ্চালন", "শ্বসন ও শ্বাসক্রিয়া", "বর্জ্য ও নিষ্কাশন", "চলন ও অঙ্গচালনা", "স্নায়বিক সমন্বয়", "রাসায়নিক সমন্বয়", "মানব জীবনের ধারাবাহিকতা", "মানবদেহের প্রতিরক্ষা", "জিনতত্ত্ব ও বিবর্তন", "প্রাণীর আচরণ"],
    "ICT": ["তথ্য ও যোগাযোগ প্রযুক্তি বিশ্ব ও বাংলাদেশ", "কমিউনিকেশন সিস্টেমস ও নেটওয়ার্কিং", "সংখ্যা পদ্ধতি ও ডিজিটাল ডিভাইস", "ওয়েব ডিজাইন পরিচিতি এবং HTML", "প্রোগ্রামিং ভাষা (C)", "ডেটাবেজ ম্যানেজমেন্ট সিস্টেম"],
    "Bangla 1st Paper": ["গদ্য", "পদ্য", "উপন্যাস", "নাটক"],
    "Bangla 2nd Paper": ["ব্যাকরণ", "নির্মিতি"],
    "English 1st Paper": ["Comprehension", "Vocabulary", "Writing"],
    "English 2nd Paper": ["Grammar", "Composition"]
};

// Initialize Dropdowns
function initDropdowns() {
    let subjectHTML = '<option value="All">All Subjects</option>';
    let filterSubjectHTML = '<option value="All">All Subjects</option>';
    
    for (let sub in hscData) {
        let opt = `<option value="${sub}">${sub}</option>`;
        subjectHTML += opt;
        filterSubjectHTML += opt;
    }
    
    document.getElementById("examSubject").innerHTML = subjectHTML;
    document.getElementById("subject").innerHTML = subjectHTML;
    document.getElementById("filterSubject").innerHTML = filterSubjectHTML;
}

function updateChapters(subId, chapId) {
    let sub = document.getElementById(subId).value;
    let chapSelect = document.getElementById(chapId);
    let html = '<option value="All">All Chapters</option>';
    
    if (hscData[sub]) {
        hscData[sub].forEach(c => {
            html += `<option value="${c}">${c}</option>`;
        });
    }
    chapSelect.innerHTML = html;
}

function show(id) {  
  ["page1","page2","page3","page4"].forEach(p => document.getElementById(p).style.display="none");  
  document.getElementById(id).style.display="block";  
  window.scrollTo(0,0);  
}  
  
function showQMsg(text, bg) {  
  var el = document.getElementById("qMsg");  
  el.style.display = "block";  
  el.style.background = bg || "#1e3a5f";  
  el.innerHTML = text;  
}  
  
// ===== TEACHER LOGIN =====  
function teacherLogin() {  
  var u = document.getElementById("user").value;  
  var p = document.getElementById("pass").value;  
  if (u==="admin" && p==="1234") {  
    show("page2");  
    loadQCount();  
    loadQuestions();
  } else {  
    alert("❌ ভুল username বা password!");  
  }  
}  
  
function loadQCount() {  
  fetch(DB+"/questions.json").then(r => r.json()).then(data => {  
      var count = data ? Object.keys(data).length : 0;  
      showQMsg("✅ Firebase-এ মোট "+count+"টি প্রশ্ন আছে।", "#14532d");  
  });  
}  
  
// ===== ADD QUESTION =====  
function addQuestion() {  
  var q = document.getElementById("q").value.trim();  
  var o1 = document.getElementById("o1").value.trim();  
  var o2 = document.getElementById("o2").value.trim();  
  var o3 = document.getElementById("o3").value.trim();  
  var o4 = document.getElementById("o4").value.trim();  
  var correct = parseInt(document.getElementById("correct").value); 
  var subject = document.getElementById("subject").value;
  var chapter = document.getElementById("chapter").value; 
  var exp = document.getElementById("exp").value.trim(); 
  
  if (subject === "All" || subject === "") { alert("Subject সিলেক্ট করো!"); return; }
  if (!q||!o1||!o2||!o3||!o4) { alert("সব field পূরণ করো!"); return; }  
  
  showQMsg("⏳ Save হচ্ছে...", "#1e3a5f");  
  
  fetch(DB+"/questions.json", {  
    method: "POST",  
    headers: {"Content-Type":"application/json"},  
    body: JSON.stringify({ subject: subject, chapter: chapter, q: q, a: [o1,o2,o3,o4], correct: correct, exp: exp })
  }).then(() => {  
      ["q","o1","o2","o3","o4","exp"].forEach(id => document.getElementById(id).value="");  
      loadQCount();  
      loadQuestions();
  });  
}  

function clearAllQuestions() {  
  if (!confirm("সব প্রশ্ন মুছে ফেলবে?")) return;  
  fetch(DB+"/questions.json", {method:"DELETE"}).then(() => { 
      showQMsg("🗑 সব প্রশ্ন মুছে গেছে।", "#7f1d1d"); 
      loadQuestions();
  });  
}  
  
// ===== STUDENT LOGIN =====  
function studentLogin() {  
  student = document.getElementById("studentName").value.trim();  
  sClass = document.getElementById("studentClass").value.trim();  
  var sPass = document.getElementById("studentPass").value; 
  var examSubject = document.getElementById("examSubject").value;
  var examChapter = document.getElementById("examChapter").value; 
  
  if (!student||!sClass) { alert("নাম ও ক্লাস লেখো!"); return; }  
  if (sPass !== "god++") { alert("❌ ভুল Exam Password!"); return; }
  
  fetch(DB+"/questions.json").then(r => r.json()).then(data => {  
      if (!data) { alert("❌ কোনো প্রশ্ন নেই!"); return; }  
      
      examQuestions = Object.values(data);
      
      // Advanced Filter
      if(examSubject !== "All" && examSubject !== ""){
          examQuestions = examQuestions.filter(q => q.subject === examSubject);
      }
      if(examChapter !== "All"){
          examQuestions = examQuestions.filter(q => q.chapter === examChapter);
      }

      if(examQuestions.length === 0){
          alert("এই Subject/Chapter এর কোনো প্রশ্ন পাওয়া যায়নি!");
          return;
      }
      startExam();
    });  
}  

// ===== OPTION LOCK FUNCTION =====
function lockOptions(qIndex) {
    let radios = document.getElementsByName('q' + qIndex);
    radios.forEach(r => {
        if (!r.checked) {
            r.disabled = true;
            r.parentElement.classList.add("disabled");
        }
    });
}
  
// ===== START EXAM =====  
function startExam() {  
  submitted = false;  
  warn = 0;  
  examQuestions = examQuestions.sort(() => Math.random() - 0.5);  
  var html = "";  
  
  examQuestions.forEach((x,i) => {  
    html += '<div class="card"><p><strong>'+(i+1)+'. '+x.q+'</strong></p>';  
    var options = x.a.map((opt, idx) => ({text: opt, originalIndex: idx}));  
    options.sort(() => Math.random() - 0.5);  
    options.forEach(o => {  
      html += '<label class="radio-label"><input type="radio" name="q'+i+'" value="'+o.originalIndex+'" onchange="lockOptions('+i+')"> '+o.text+'</label>';  
    });  
    html += '</div>';  
  });  
  
  document.getElementById("quiz").innerHTML = html;  
  document.getElementById("warnDiv").innerHTML = "";  
  show("page3");  
  
  timeLeft = examQuestions.length * 60; // 1 min per question
  totalTime = timeLeft;  
  if (timerInterval) clearInterval(timerInterval);  
  
  timerInterval = setInterval(() => {  
    timeLeft--;  
    var m = Math.floor(timeLeft/60);  
    var s = timeLeft%60;  
    document.getElementById("timer").innerText = "⏱ " + m + ":" + (s<10?"0":"") + s;  
    var p = (timeLeft/totalTime)*100;  
    document.getElementById("progress").style.width = p + "%";  
    document.getElementById("progress").style.background = p < 30 ? "#ef4444" : "#22c55e";  
    if(timeLeft <= 0) submitExam();  
  },1000);  
}  
  
// ===== SUBMIT & REVIEW =====  
function submitExam() {  
  if (submitted) return;  
  submitted = true;  
  if (timerInterval) clearInterval(timerInterval);  
  
  var score = 0, wrongAnswers = 0, review = "", answered = 0;
  var examSubject = document.getElementById("examSubject").value;
  var examChapter = document.getElementById("examChapter").value;
  
  examQuestions.forEach((x,i) => {  
    var ans = document.querySelector('input[name=q'+i+']:checked');  
    var expHtml = (x.exp && x.exp !== "") ? "<br><br>💡 <b>ব্যাখ্যা:</b> " + x.exp : ""; 
    
    if(ans){  
      answered++;
      if(parseInt(ans.value) === x.correct){  
        score++; // +1 for correct 
        review += "<div class='card' style='border:2px solid #22c55e'>✔ Q: "+x.q+"<br>Your Ans: "+x.a[x.correct]+ expHtml + "</div>";
      } else {  
        wrongAnswers++; // -0.25 for wrong
        review += "<div class='card' style='border:2px solid #ef4444'>❌ Q: "+x.q+"<br>✔ Correct Ans: "+x.a[x.correct]+ expHtml + "</div>";  
      }  
    } else {  
      review += "<div class='card'>⚠️ Not answered: "+x.q+"<br>✔ Correct Ans: "+x.a[x.correct]+ expHtml +"</div>";  
    }  
  });  
  
  var negativeMarks = wrongAnswers * 0.25;
  var finalScore = score - negativeMarks; // Calculation of final point
  // Allowing negative global points is optional, but for exam percent, we keep it >= 0
  var displayScore = finalScore < 0 ? 0 : finalScore; 
  var percent = Math.round((displayScore/examQuestions.length)*100);  

  var grade = percent>=80?"A+": percent>=70?"A": percent>=60?"B": percent>=50?"C": percent>=40?"D":"F";  
  var pass = percent >= 40;  

  fetch(DB+"/results.json",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:student, class:sClass, subject:examSubject, chapter:examChapter,
      score:finalScore, // saving actual score for global calculation (even if negative)
      displayScore: displayScore, total:examQuestions.length, percent:percent, grade:grade,
      time:new Date().toLocaleString()
    })
  });

  document.getElementById("result").innerHTML =  
    '<div class="card" style="text-align:center;">'+  
    '<div style="font-size:3rem;">'+(pass?"🎉":"😔")+'</div>'+  
    '<h2>RESULT</h2>'+  
    '<p>👤 <strong>'+student+'</strong> | Class: '+sClass+'</p>'+  
    '<p>📚 Sub: '+examSubject+' ('+examChapter+')</p>'+
    '<p>✅ Correct: '+score+' | ❌ Wrong: '+wrongAnswers+' (Penalty: -'+negativeMarks+')</p>'+
    '<p style="font-size:2rem;font-weight:bold;">Points: '+ finalScore+' / '+examQuestions.length+ ' ('+percent+'%)</p>'+  
    '<p style="font-size:1.3rem;color:'+(pass?'#22c55e':'#ef4444')+ ';">'+ (pass?'✅ PASS':'❌ FAIL')+ ' | Grade: '+grade+ '</p>'+  
    '</div><hr><h3>📚 Review & Explanations</h3>'+review;  
    
  loadLeaderboards();  
  show("page4");  
}  

function loadLeaderboards() {
  fetch(DB + "/results.json").then(r => r.json()).then(data => {
      if (!data) { 
          document.getElementById("board").innerHTML = "কোনো result নেই।"; 
          document.getElementById("globalBoard").innerHTML = "কোনো data নেই।";
          return; 
      }
      
      var results = Object.values(data);
      
      // 1. Current Exam Leaderboard (Subject/Chapter Filtered)
      var filterSub = document.getElementById("examSubject").value;
      var filterChap = document.getElementById("examChapter").value;
      var examResults = results;
      
      if (filterSub !== "All" && filterSub !== "") examResults = examResults.filter(x => x.subject === filterSub);
      if (filterChap !== "All") examResults = examResults.filter(x => x.chapter === filterChap);
      
      examResults.sort((a,b) => b.percent - a.percent);
      var htmlExam = examResults.slice(0,10).map((d,i) => {
        let extraClass = i === 0 ? "top-rank-1" : i === 1 ? "top-rank-2" : i === 2 ? "top-rank-3" : "";
        let medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "🏅 " + (i+1)+".";
        return `<div class="card ${extraClass}">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div><span style="font-size:1.2rem; font-weight:bold;">${medal} ${d.name}</span> <small>(${d.class})</small><br><small>📚 ${d.subject} - ${d.chapter}</small></div>
                <div style="text-align:right; font-weight:bold;">${d.percent}%<br>${d.grade}</div>
            </div>
          </div>`;
      }).join("");
      document.getElementById("board").innerHTML = htmlExam || "<div class='card'>No data for this subject/chapter</div>";

        // 2. Global Points Leaderboard
      var users = {};
      results.forEach(r => {
          if(!users[r.name]) users[r.name] = { name: r.name, class: r.class, totalPoints: 0, exams: 0 };
          users[r.name].totalPoints += parseFloat(r.score || 0);
          users[r.name].exams += 1;
      });
      
      var globalResults = Object.values(users).sort((a,b) => b.totalPoints - a.totalPoints);
      var htmlGlobal = globalResults.slice(0,10).map((d,i) => {
        let extraClass = i === 0 ? "top-rank-1" : i === 1 ? "top-rank-2" : i === 2 ? "top-rank-3" : "";
        let medal = i === 0 ? "👑" : i === 1 ? "🌟" : i === 2 ? "🔥" : "#" + (i+1);
        return `<div class="card ${extraClass}">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div><span style="font-size:1.2rem; font-weight:bold;">${medal} ${d.name}</span> <small>(${d.class})</small><br><small>📝 Total Exams: ${d.exams}</small></div>
                <div style="text-align:right; font-weight:bold; font-size:1.3rem;">XP: ${d.totalPoints.toFixed(2)}</div>
            </div>
          </div>`;
      }).join("");
      document.getElementById("globalBoard").innerHTML = htmlGlobal;
    });
}

// ===== TEACHER PANEL: LOAD & FILTER QUESTIONS =====
function loadQuestions() {
  var searchText = document.getElementById("searchQuestion").value.toLowerCase();
  var searchSub = document.getElementById("filterSubject").value;
  
  fetch(DB + "/questions.json").then(r => r.json()).then(data => {
      if (!data) { document.getElementById("questionList").innerHTML = "<div class='card'>কোনো প্রশ্ন নেই</div>"; return; }
      
      var html = "";
      Object.keys(data).forEach(key => {
        var q = data[key];
        if (!q || !q.q) return;
        
        if (searchSub !== "All" && q.subject !== searchSub) return;
        if (searchText && !q.q.toLowerCase().includes(searchText)) return;
        
        html += `<div class="card">
            <b>Q:</b> ${q.q}<br>
            <small><b>Sub:</b> ${q.subject} | <b>Chap:</b> ${q.chapter||'N/A'}</small><br>
            <b>Options:</b><br>
            1) ${q.a[0]} ${q.correct===0?"✅":""}<br>
            2) ${q.a[1]} ${q.correct===1?"✅":""}<br>
            3) ${q.a[2]} ${q.correct===2?"✅":""}<br>
            4) ${q.a[3]} ${q.correct===3?"✅":""}<br>
            <div class="q-actions">
                <button class="btn-yellow" style="width:50%; margin:0;" onclick="editQuestion('${key}')">✏ Edit</button>
                <button class="btn-red" style="width:50%; margin:0;" onclick="deleteQuestion('${key}')">🗑 Delete</button>
            </div>
          </div>`;
      });
      document.getElementById("questionList").innerHTML = html || "<div class='card'>No matching questions</div>";
    });
}

// ===== EDIT QUESTION =====
function editQuestion(id){
  fetch(DB + "/questions/" + id + ".json").then(r => r.json()).then(oldData => {
      if(!oldData) return;
      
      var newQ = prompt("প্রশ্নটি এডিট করুন:", oldData.q);
      if(newQ === null || newQ.trim() === "") return;
      
      var newO1 = prompt("Option 1:", oldData.a[0]);
      var newO2 = prompt("Option 2:", oldData.a[1]);
      var newO3 = prompt("Option 3:", oldData.a[2]);
      var newO4 = prompt("Option 4:", oldData.a[3]);
      var newCor = prompt("কোনটি সঠিক উত্তর? (1, 2, 3, বা 4 লিখুন):", (oldData.correct + 1));
      
      if(!newO1 || !newO2 || !newO3 || !newO4 || !newCor) { alert("সব অপশন ঠিকভাবে দিন!"); return; }

      oldData.q = newQ.trim();
      oldData.a = [newO1.trim(), newO2.trim(), newO3.trim(), newO4.trim()];
      oldData.correct = parseInt(newCor) - 1;

      fetch(DB + "/questions/" + id + ".json", {
        method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(oldData)
      }).then(() => { alert("✅ Updated!"); loadQuestions(); });
  });
}

function deleteQuestion(id){
  if(!confirm("Question delete করবে?")) return;
  fetch(DB + "/questions/" + id + ".json", { method: "DELETE" }).then(() => { loadQuestions(); loadQCount(); });
}

function loadResults() {
  fetch(DB + "/results.json").then(r => r.json()).then(data => {
      if (!data) return;
      var search = document.getElementById("searchResult").value.toLowerCase();
      var html = "";
      Object.values(data).reverse().forEach(r => {
       if(search && !r.name.toLowerCase().includes(search)) return;
        html += `<div class="card"><b>👤 ${r.name}</b> (Class: ${r.class})<br>📚 ${r.subject} - ${r.chapter}<br>📊 XP Score: ${r.score} | 🎯 ${r.percent}% | 🏆 ${r.grade}<br>🕒 ${r.time}</div>`;
      });
      document.getElementById("allResults").innerHTML = html;
    });
}

window.onload = function(){ 
    initDropdowns(); 
    loadQuestions(); 
    loadResults(); 
};
setInterval(() => { if(document.getElementById("page4").style.display === "block") loadLeaderboards(); }, 5000);
