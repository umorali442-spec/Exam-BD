<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOD++ School Exam System</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#050816;color:white;padding:16px;}
.container{max-width:900px;margin:auto;background:#0f172a;padding:24px;border-radius:16px;}
h2{text-align:center;margin-bottom:20px;}

input,select{
width:100%;padding:10px;margin:5px 0;
border-radius:8px;border:1px solid #334155;
background:#1e293b;color:white;
}

button{
width:100%;padding:11px;margin-top:8px;
border:none;border-radius:8px;
cursor:pointer;font-weight:600;
}

.btn-blue{background:#2563eb;color:white;}
.btn-green{background:#22c55e;color:white;}
.btn-red{background:#ef4444;color:white;}
.btn-yellow{background:#f59e0b;color:black;}
.btn-gray{background:#475569;color:white;}

.card{background:#1e293b;padding:14px;margin:8px 0;border-radius:10px;}
#timer{font-size:22px;color:#f87171;font-weight:bold;}
#progressBar{height:8px;background:#334155;border-radius:10px;}
#progress{height:8px;background:#22c55e;width:100%;}
.radio-label{display:flex;gap:8px;align-items:center;}
.warn{background:#7f1d1d;padding:10px;margin:8px 0;border-radius:8px;}
</style>
</head>

<body>
<div class="container">

<h2>🏫 GOD++ SCHOOL EXAM SYSTEM</h2>

<!-- PAGE 1 -->
<div id="page1">

  <div class="card">
    <h3>👨‍🎓 Student Login</h3>
    <input id="studentName" placeholder="তোমার নাম">
    <input id="studentClass" placeholder="তোমার ক্লাস">

    <select id="subject">
      <option value="math">Math</option>
      <option value="english">English</option>
      <option value="science">Science</option>
    </select>

    <button class="btn-blue" onclick="studentLogin()">Start Exam</button>
  </div>

  <div class="card">
    <h3>🔐 Teacher Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button class="btn-blue" onclick="teacherLogin()">Login</button>
  </div>

</div>

<!-- PAGE 2 -->
<div id="page2" style="display:none;">

  <div class="card">
    <h3>➕ Add Question</h3>

    <input id="q" placeholder="Question">
    <input id="o1" placeholder="Option 1">
    <input id="o2" placeholder="Option 2">
    <input id="o3" placeholder="Option 3">
    <input id="o4" placeholder="Option 4">

    <select id="correct">
      <option value="0">Option 1</option>
      <option value="1">Option 2</option>
      <option value="2">Option 3</option>
      <option value="3">Option 4</option>
    </select>

    <select id="qsub">
      <option value="math">Math</option>
      <option value="english">English</option>
      <option value="science">Science</option>
    </select>

    <button class="btn-green" onclick="addQuestion()">Add Question</button>
  </div>

  <button class="btn-gray" onclick="clearAllQuestions()">Delete All Questions</button>

  <button class="btn-yellow" onclick="loadResults()">All Results</button>
  <div id="allResults"></div>

</div>

<!-- PAGE 3 -->
<div id="page3" style="display:none;">
  <div id="timer">⏱</div>
  <div id="progressBar"><div id="progress"></div></div>
  <div id="warnDiv"></div>
  <div id="quiz"></div>
  <button class="btn-red" onclick="submitExam()">Submit</button>
</div>

<!-- PAGE 4 -->
<div id="page4" style="display:none;">
  <div id="result"></div>

  <div class="card">
    <h3>🏆 Leaderboard</h3>
    <div id="board"></div>
  </div>

  <div class="card">
    <h3>👑 Hall of Fame</h3>
    <div id="hallOfFame"></div>
  </div>

  <button class="btn-blue" onclick="show('page1')">Restart</button>
</div>

</div>

<script>
   var DB="https://exam-bd-b9668-default-rtdb.firebaseio.com";

var student="", sClass="", subject="";
var examQuestions=[];
var timer=null;
var timeLeft=0;
var totalTime=0;
var warn=0;
var submitted=false;

// ===== PAGE SWITCH =====
function show(id){
  ["page1","page2","page3","page4"].forEach(p=>{
    document.getElementById(p).style.display="none";
  });
  document.getElementById(id).style.display="block";
  window.scrollTo(0,0);
}

// ===== TEACHER LOGIN =====
function teacherLogin(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    show("page2");
  } else {
    alert("❌ Wrong login");
  }
}

// ===== ADD QUESTION (SUBJECT INCLUDED) =====
function addQuestion(){
  let q=document.getElementById("q").value.trim();
  let o1=document.getElementById("o1").value.trim();
  let o2=document.getElementById("o2").value.trim();
  let o3=document.getElementById("o3").value.trim();
  let o4=document.getElementById("o4").value.trim();
  let correct=parseInt(document.getElementById("correct").value);
  let subjectAdd=document.getElementById("subjectAdd").value.trim();

  if(!q||!o1||!o2||!o3||!o4||!subjectAdd){
    alert("সব field fill করো!");
    return;
  }

  fetch(DB+"/questions.json",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      q,
      a:[o1,o2,o3,o4],
      correct,
      subject:subjectAdd
    })
  });

  alert("✅ Question Added");
}

// ===== DELETE ALL QUESTIONS =====
function clearAll(){
  if(confirm("সব question delete?")){
    fetch(DB+"/questions.json",{method:"DELETE"});
  }
}

// ===== STUDENT LOGIN =====
function studentLogin(){
  student=document.getElementById("studentName").value.trim();
  sClass=document.getElementById("studentClass").value.trim();
  subject=document.getElementById("subject").value;

  if(!student||!sClass){
    alert("Name & Class required");
    return;
  }

  fetch(DB+"/questions.json")
  .then(r=>r.json())
  .then(data=>{

    if(!data){
      alert("No questions found");
      return;
    }

    // ⭐ SUBJECT FILTER (MAIN FEATURE)
    examQuestions=Object.values(data)
      .filter(q=>q.subject===subject);

    if(examQuestions.length===0){
      alert("No exam for this subject");
      return;
    }

    startExam();
  });
}

// ===== START EXAM =====
function startExam(){
  submitted=false;
  warn=0;

  examQuestions=examQuestions.sort(()=>Math.random()-0.5);

  let html="";

  examQuestions.forEach((q,i)=>{

    let opts=q.a.map((x,j)=>({x,j}))
      .sort(()=>Math.random()-0.5);

    html+=`<div class="card"><b>${i+1}. ${q.q}</b><br>`;

    opts.forEach(o=>{
      html+=`
      <label>
        <input type="radio" name="q${i}" value="${o.j}">
        ${o.x}
      </label><br>`;
    });

    html+="</div>";
  });

  document.getElementById("quiz").innerHTML=html;

  show("page3");

  timeLeft=examQuestions.length*60;
  totalTime=timeLeft;

  clearInterval(timer);

  timer=setInterval(()=>{
    timeLeft--;

    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;

    document.getElementById("timer").innerHTML=
      `⏱ ${m}:${s<10?"0":""}${s}`;

    if(timeLeft<=0) submitExam();
  },1000);
}

// ===== ANTI CHEAT =====
document.addEventListener("visibilitychange",()=>{
  if(document.hidden && !submitted){
    warn++;
    document.getElementById("warnDiv").innerHTML=
      "⚠️ Warning "+warn+"/3";

    if(warn>=3) submitExam();
  }
});

document.addEventListener("copy",e=>e.preventDefault());
document.addEventListener("contextmenu",e=>e.preventDefault());

// ===== SUBMIT EXAM =====
function submitExam(){
  if(submitted) return;
  submitted=true;

  clearInterval(timer);

  let score=0;
  let review="";

  examQuestions.forEach((q,i)=>{
    let ans=document.querySelector(`input[name=q${i}]:checked`);

    if(ans && parseInt(ans.value)===q.correct){
      score++;
    } else {
      review+=`<div class="card">❌ ${q.q}<br>✔ Correct: ${q.a[q.correct]}</div>`;
    }
  });

  let percent=Math.round((score/examQuestions.length)*100);

  let grade=
    percent>=80?"A+":
    percent>=70?"A":
    percent>=60?"B":
    percent>=50?"C":
    percent>=40?"D":"F";

  let badge=
    percent===100?"👑 LEGEND":
    percent>=90?"🥇 GOLD MASTER":
    percent>=70?"🥈 SILVER STAR":
    percent>=50?"🥉 BRONZE HERO":
    "📚 TRY AGAIN";

  // SAVE RESULT
  fetch(DB+"/results.json",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:student,
      class:sClass,
      subject,
      score,
      total:examQuestions.length,
      percent,
      grade,
      badge,
      time:new Date().toLocaleString()
    })
  });

  document.getElementById("result").innerHTML=`
    <div class="card">
      <h2>🎯 RESULT</h2>
      <p>👤 ${student}</p>
      <p>🏫 ${sClass}</p>
      <p>📊 ${score}/${examQuestions.length}</p>
      <p>🎯 ${percent}%</p>
      <p>🏆 ${grade}</p>
      <p>${badge}</p>
    </div>
  `;

  loadBoard();
  loadHall();
  loadAllResults();

  show("page4");
}

// ===== LEADERBOARD (TOP 10) =====
function loadBoard(){
  fetch(DB+"/results.json")
  .then(r=>r.json())
  .then(data=>{

    let arr=Object.values(data||{})
      .sort((a,b)=>b.percent-a.percent);

    document.getElementById("board").innerHTML=
    arr.slice(0,10).map((x,i)=>
      `<div class="card">${i+1}. ${x.name} (${x.subject}) - ${x.percent}%</div>`
    ).join("");
  });
}

// ===== HALL OF FAME (90%+) =====
function loadHall(){
  fetch(DB+"/results.json")
  .then(r=>r.json())
  .then(data=>{

    let arr=Object.values(data||{})
      .filter(x=>x.percent>=90)
      .sort((a,b)=>b.percent-a.percent);

    document.getElementById("hallOfFame").innerHTML=
    arr.length
    ? arr.map(x=>`<div class="card">👑 ${x.name} (${x.subject}) - ${x.percent}%</div>`).join("")
    : "No Legend Yet 👑";
  });
}

// ===== ALL RESULTS =====
function loadAllResults(){
  fetch(DB+"/results.json")
  .then(r=>r.json())
  .then(data=>{

    if(!data){
      document.getElementById("allResults").innerHTML="No data";
      return;
    }

    document.getElementById("allResults").innerHTML=
    Object.values(data).reverse().map(r=>
      `<div class="card">
        👤 ${r.name} | ${r.class} | ${r.subject}<br>
        📊 ${r.score}/${r.total} | ${r.percent}%<br>
        🏆 ${r.grade}
      </div>`
    ).join("");
  });
 }
