<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam BD Ultimate System</title>

<style>
body{
  font-family: Arial;
  background:#eef6ff;
  padding:20px;
}

.container{
  max-width:850px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
}

input, select{
  padding:10px;
  margin:5px 0;
  width:90%;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  margin-top:5px;
}

#loginBtn{background:#007bff;color:white;}
#addBtn{background:#28a745;color:white;}
#startBtn{background:#ff9800;color:white;}
#submitBtn{background:#dc3545;color:white;}

.q{
  padding:15px;
  margin:10px 0;
  background:#f9f9f9;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#timer{
  color:red;
  font-weight:bold;
  font-size:18px;
}

#progress{
  height:10px;
  background:#4caf50;
  border-radius:10px;
  width:100%;
}
</style>

</head>

<body>

<div class="container">

<h2>📘 Exam BD Ultimate (Full System)</h2>

<!-- STUDENT LOGIN -->
<div id="studentBox">
  <h3>👨‍🎓 Student Login</h3>
  <input type="text" id="studentName" placeholder="Enter Your Name"><br>
  <button onclick="studentLogin()">Start Exam</button>
</div>

<!-- ADMIN LOGIN -->
<div id="loginBox" style="display:none;">
  <h3>🔐 Admin Login</h3>
  <input type="text" id="user"><br>
  <input type="password" id="pass"><br>
  <button id="loginBtn" onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

<h3>🧑‍🏫 Admin Panel</h3>

<input type="text" id="q" placeholder="Question"><br>
<input type="text" id="o1" placeholder="Option 1"><br>
<input type="text" id="o2" placeholder="Option 2"><br>
<input type="text" id="o3" placeholder="Option 3"><br>
<input type="text" id="o4" placeholder="Option 4"><br>

<select id="correct">
  <option value="0">Option 1</option>
  <option value="1">Option 2</option>
  <option value="2">Option 3</option>
  <option value="3">Option 4</option>
</select><br>

<button id="addBtn" onclick="addQuestion()">Add Question</button>
<button id="startBtn" onclick="startExam()">Start Exam</button>

<hr>

<div id="timer">Time: 60</div>

<div style="width:100%;background:#ddd;border-radius:10px;">
  <div id="progress"></div>
</div>

<div id="quiz"></div>

<button id="submitBtn" onclick="submitExam()">Submit</button>

<h3 id="result"></h3>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<script>

// 🔥 Firebase config (replace)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// DATA
let questions = [];
let time = 60;
let totalTime = 60;
let timer;

let currentStudent="";
let currentUser="";
let warningCount=0;

// 👨‍🎓 STUDENT LOGIN
function studentLogin(){
  let name=document.getElementById("studentName").value;
  if(name.trim()===""){ alert("Enter name"); return; }

  currentStudent=name;

  document.getElementById("studentBox").style.display="none";
  document.getElementById("loginBox").style.display="block";

  loadQuestions();
}

// 🔐 ADMIN LOGIN
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    currentUser=u;
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="block";
  }else{
    alert("Wrong login");
  }
}

// ☁️ ADD QUESTION (FIREBASE)
function addQuestion(){

  let q=document.getElementById("q").value;
  let o1=document.getElementById("o1").value;
  let o2=document.getElementById("o2").value;
  let o3=document.getElementById("o3").value;
  let o4=document.getElementById("o4").value;
  let c=parseInt(document.getElementById("correct").value);

  db.ref("questions").push({
    q:q,
    a:[o1,o2,o3,o4],
    correct:c
  });

  alert("Saved to Firebase!");
}

// 📥 LOAD QUESTIONS
function loadQuestions(){
  db.ref("questions").on("value", snap=>{
    questions=[];
    snap.forEach(child=>{
      questions.push(child.val());
    });
  });
}

// START EXAM
function startExam(){

  let html="";

  questions.forEach((x,i)=>{
    html+=`
    <div class="q">
      <h4>${i+1}. ${x.q}</h4>
      ${x.a.map((o,j)=>
        `<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`
      ).join("")}
    </div>`;
  });

  document.getElementById("quiz").innerHTML=html;

  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="Time: "+time;

    let percent=(time/totalTime)*100;
    document.getElementById("progress").style.width=percent+"%";

    if(time<=0) submitExam();
  },1000);
}

// 🛡️ ANTI CHEAT
document.addEventListener("visibilitychange", function(){
  if(document.hidden){
    warningCount++;
    alert("⚠️ Tab switch detected!");

    if(warningCount>=3){
      submitExam();
    }
  }
});

document.addEventListener("contextmenu", e=>e.preventDefault());
document.addEventListener("copy", e=>e.preventDefault());

// 📊 SUBMIT
function submitExam(){

  clearInterval(timer);

  let score=0;

  questions.forEach((x,i)=>{
    let ans=document.querySelector(`input[name=q${i}]:checked`);
    if(ans && parseInt(ans.value)===x.correct){
      score++;
    }
  });

  let percent=Math.round((score/questions.length)*100);

  document.getElementById("result").innerHTML=
  `
  <div style="padding:15px;background:#e8f5e9;border-radius:10px;">
  🎯 Score: ${score}/${questions.length}<br>
  📊 Percentage: ${percent}%<br>
  👤 Student: ${currentStudent}
  </div>
  `;
}

</script>

</body>
</html>
