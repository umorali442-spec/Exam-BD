<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOD++ School Exam System</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#050816;color:white;padding:16px;}
.container{max-width:900px;margin:auto;background:#0f172a;padding:24px;border-radius:16px;}
h2{text-align:center;margin-bottom:20px;}

input,select{
width:100%;padding:10px;margin:5px 0;
border-radius:8px;border:1px solid #334155;
background:#1e293b;color:white;
}

button{
width:100%;padding:11px;margin-top:8px;
border:none;border-radius:8px;
cursor:pointer;font-weight:600;
}

.btn-blue{background:#2563eb;color:white;}
.btn-green{background:#22c55e;color:white;}
.btn-red{background:#ef4444;color:white;}
.btn-yellow{background:#f59e0b;color:black;}
.btn-gray{background:#475569;color:white;}

.card{background:#1e293b;padding:14px;margin:8px 0;border-radius:10px;}
#timer{font-size:22px;color:#f87171;font-weight:bold;}
#progressBar{height:8px;background:#334155;border-radius:10px;}
#progress{height:8px;background:#22c55e;width:100%;}
.radio-label{display:flex;gap:8px;align-items:center;}
.warn{background:#7f1d1d;padding:10px;margin:8px 0;border-radius:8px;}
</style>
</head>

<body>
<div class="container">

<h2>🏫 GOD++ SCHOOL EXAM SYSTEM</h2>

<!-- PAGE 1 -->
<div id="page1">

  <div class="card">
    <h3>👨‍🎓 Student Login</h3>
    <input id="studentName" placeholder="তোমার নাম">
    <input id="studentClass" placeholder="তোমার ক্লাস">

    <select id="subject">
      <option value="math">Math</option>
      <option value="english">English</option>
      <option value="science">Science</option>
    </select>

    <button class="btn-blue" onclick="studentLogin()">Start Exam</button>
  </div>

  <div class="card">
    <h3>🔐 Teacher Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button class="btn-blue" onclick="teacherLogin()">Login</button>
  </div>

</div>

<!-- PAGE 2 -->
<div id="page2" style="display:none;">

  <div class="card">
    <h3>➕ Add Question</h3>

    <input id="q" placeholder="Question">
    <input id="o1" placeholder="Option 1">
    <input id="o2" placeholder="Option 2">
    <input id="o3" placeholder="Option 3">
    <input id="o4" placeholder="Option 4">

    <select id="correct">
      <option value="0">Option 1</option>
      <option value="1">Option 2</option>
      <option value="2">Option 3</option>
      <option value="3">Option 4</option>
    </select>

    <select id="qsub">
      <option value="math">Math</option>
      <option value="english">English</option>
      <option value="science">Science</option>
    </select>

    <button class="btn-green" onclick="addQuestion()">Add Question</button>
  </div>

  <button class="btn-gray" onclick="clearAllQuestions()">Delete All Questions</button>

  <button class="btn-yellow" onclick="loadResults()">All Results</button>
  <div id="allResults"></div>

</div>

<!-- PAGE 3 -->
<div id="page3" style="display:none;">
  <div id="timer">⏱</div>
  <div id="progressBar"><div id="progress"></div></div>
  <div id="warnDiv"></div>
  <div id="quiz"></div>
  <button class="btn-red" onclick="submitExam()">Submit</button>
</div>

<!-- PAGE 4 -->
<div id="page4" style="display:none;">
  <div id="result"></div>

  <div class="card">
    <h3>🏆 Leaderboard</h3>
    <div id="board"></div>
  </div>

  <div class="card">
    <h3>👑 Hall of Fame</h3>
    <div id="hallOfFame"></div>
  </div>

  <button class="btn-blue" onclick="show('page1')">Restart</button>
</div>

</div>

<script>
   

var DB = "https://exam-bd-b9668-default-rtdb.firebaseio.com";

var student = "";
var sClass = "";
var selectedSubject = "";
var examQuestions = [];
var timeLeft = 0;
var totalTime = 0;
var timerInterval = null;
var warn = 0;
var submitted = false;

// ===== PAGE SWITCH =====
function show(id) {
  ["page1","page2","page3","page4"].forEach(function(p){
    document.getElementById(p).style.display = "none";
  });
  document.getElementById(id).style.display = "block";
  window.scrollTo(0,0);
}

// ===== TEACHER LOGIN =====
function teacherLogin() {
  var u = document.getElementById("user").value;
  var p = document.getElementById("pass").value;

  if (u === "admin" && p === "1234") {
    show("page2");
    loadQCount();
  } else {
    alert("❌ ভুল username বা password!");
  }
}

function loadQCount() {
  fetch(DB + "/questions.json")
    .then(r => r.json())
    .then(data => {
      var count = data ? Object.keys(data).length : 0;
      alert("✅ মোট প্রশ্ন: " + count);
    });
}

// ===== ADD QUESTION (SUBJECT FIXED) =====
function addQuestion() {
  var q = document.getElementById("q").value.trim();
  var o1 = document.getElementById("o1").value.trim();
  var o2 = document.getElementById("o2").value.trim();
  var o3 = document.getElementById("o3").value.trim();
  var o4 = document.getElementById("o4").value.trim();
  var correct = parseInt(document.getElementById("correct").value);

  if (!q || !o1 || !o2 || !o3 || !o4) {
    alert("সব field পূরণ করো!");
    return;
  }

  fetch(DB + "/questions.json", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      q: q,
      a: [o1,o2,o3,o4],
      correct: correct,
      subject: document.getElementById("qsub").value
})
  }).then(() => {
    alert("✅ প্রশ্ন যোগ হয়েছে");
  });
}

// ===== CLEAR QUESTIONS =====
function clearAllQuestions() {
  if (!confirm("সব প্রশ্ন মুছে ফেলবে?")) return;

  fetch(DB + "/questions.json", { method: "DELETE" })
    .then(() => alert("🗑 সব প্রশ্ন মুছে গেছে"));
}

// ===== STUDENT LOGIN =====
function studentLogin() {
  student = document.getElementById("studentName").value.trim();
  sClass = document.getElementById("studentClass").value.trim();
  selectedSubject = document.getElementById("subject").value;

  if (!student || !sClass) {
    alert("নাম ও ক্লাস লেখো!");
    return;
  }

  fetch(DB + "/questions.json")
    .then(r => r.json())
    .then(data => {

      if (!data) {
        alert("❌ কোনো প্রশ্ন নেই");
        return;
      }

      examQuestions = Object.values(data).filter(q =>
        q.subject === selectedSubject
      );

      if (examQuestions.length === 0) {
        alert("❌ এই subject এ প্রশ্ন নেই");
        return;
      }

      startExam();
    });
}

// ===== START EXAM =====
function startExam() {
  submitted = false;
  warn = 0;

  examQuestions = examQuestions.sort(() => Math.random() - 0.5);

  var html = "";

  examQuestions.forEach((x,i) => {
    html += `<div class="card"><p><b>${i+1}. ${x.q}</b></p>`;

    var options = x.a.map((opt, idx) => ({
      text: opt,
      originalIndex: idx
    }));

    options.sort(() => Math.random() - 0.5);

    options.forEach(o => {
      html += `
        <label class="radio-label">
          <input type="radio" name="q${i}" value="${o.originalIndex}">
          ${o.text}
        </label>`;
    });

    html += `</div>`;
  });

  document.getElementById("quiz").innerHTML = html;

  show("page3");

  timeLeft = examQuestions.length * 60;
  totalTime = timeLeft;

  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    timeLeft--;

    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;

    document.getElementById("timer").innerText =
      `⏱ ${m}:${s < 10 ? "0" : ""}${s}`;

    let p = (timeLeft / totalTime) * 100;

    document.getElementById("progress").style.width = p + "%";

    document.getElementById("progress").style.background =
      p < 30 ? "#ef4444" : "#22c55e";

    if (timeLeft <= 0) submitExam();

  }, 1000);
}

// ===== ANTI CHEAT =====
document.addEventListener("visibilitychange", () => {
  if (document.hidden && !submitted) {
    warn++;
    document.getElementById("warnDiv").innerHTML =
      `⚠️ Warning ${warn}/3`;

    if (warn >= 3) submitExam();
  }
});

// ===== SUBMIT =====
function submitExam() {
  if (submitted) return;
  submitted = true;

  clearInterval(timerInterval);

  let score = 0;
  let review = "";

  examQuestions.forEach((x,i) => {
    let ans = document.querySelector(`input[name=q${i}]:checked`);

    if (ans) {
      if (parseInt(ans.value) === x.correct) {
        score++;
      } else {
        review += `<div class="card">❌ ${x.q}<br>✔ ${x.a[x.correct]}</div>`;
      }
    } else {
      review += `<div class="card">⚠️ Unanswered: ${x.q}</div>`;
    }
  });

  let percent = Math.round((score / examQuestions.length) * 100);

  let grade =
    percent >= 80 ? "A+" :
    percent >= 70 ? "A" :
    percent >= 60 ? "B" :
    percent >= 50 ? "C" :
    percent >= 40 ? "D" : "F";

  let badge =
    percent === 100 ? "👑 LEGEND" :
    percent >= 90 ? "🥇 MASTER" :
    percent >= 70 ? "🥈 STAR" :
    percent >= 50 ? "🥉 HERO" :
    "📚 TRY AGAIN";

  fetch(DB + "/results.json", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: student,
      class: sClass,
      subject: selectedSubject,
      score,
      total: examQuestions.length,
      percent,
      grade,
      badge,
      time: new Date().toLocaleString()
    })
  });

  document.getElementById("result").innerHTML =
    `<div class="card">
      <h2>RESULT</h2>
      <p>${student} | ${sClass}</p>
      <h1>${score}/${examQuestions.length}</h1>
      <p>${percent}%</p>
      <p>${grade}</p>
      <p>${badge}</p>
    </div>
    <hr>
    ${review}`;

  loadLeaderboard();
  loadHallOfFame();
  show("page4");
}

// ===== LEADERBOARD =====
function loadLeaderboard() {
  fetch(DB + "/results.json")
    .then(r => r.json())
    .then(data => {

      if (!data) return;

      let arr = Object.values(data)
        .sort((a,b) => b.percent - a.percent)
        .slice(0,10);

      document.getElementById("board").innerHTML =
        arr.map((x,i) =>
          `<div class="card">
            ${i+1}. ${x.name} (${x.class})
            <br>🏆 ${x.percent}% ${x.grade}
          </div>`
        ).join("");
    });
}

// ===== HALL OF FAME =====
function loadHallOfFame() {
  fetch(DB + "/results.json")
    .then(r => r.json())
    .then(data => {

      if (!data) return;

      let legends = Object.values(data)
        .filter(x => x.percent >= 90)
        .sort((a,b) => b.percent - a.percent)
        .slice(0,10);

      document.getElementById("hallOfFame").innerHTML =
        legends.map(x =>
          `<div class="card">👑 ${x.name} (${x.class})<br>🏆 ${x.percent}%</div>`
        ).join("");
    });
}

// ===== RESULTS LIST =====
function loadResults() {
  fetch(DB + "/results.json")
    .then(r => r.json())
    .then(data => {

      if (!data) {
        document.getElementById("allResults").innerHTML =
          "<div class='card'>No Result</div>";
        return;
      }

      document.getElementById("allResults").innerHTML =
        Object.values(data).map(r =>
          `<div class="card">
            ${r.name} | ${r.class}
            <br>${r.score}/${r.total}
            <br>${r.percent}%
          </div>`
        ).join("");
    });
  </script>
</body>
</html>
