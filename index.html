function show(id) {  
  ["page1","page2","page3","page4"].forEach(function(p){  
    document.getElementById(p).style.display="none";  
  });  
  document.getElementById(id).style.display="block";  
  window.scrollTo(0,0);  
}  
  
function showQMsg(text, bg) {  
  var el = document.getElementById("qMsg");  
  el.style.display = "block";  
  el.style.background = bg || "#1e3a5f";  
  el.innerHTML = text;  
}  
  
// ===== TEACHER LOGIN =====  
function teacherLogin() {  
  var u = document.getElementById("user").value;  
  var p = document.getElementById("pass").value;  
  if (u==="admin" && p==="1234") {  
    show("page2");  
    loadQCount();  
  } else {  
    alert("❌ ভুল username বা password!");  
  }  
}  
  
function loadQCount() {  
  fetch(DB+"/questions.json")  
    .then(function(r){ return r.json(); })  
    .then(function(data){  
      var count = data ? Object.keys(data).length : 0;  
      showQMsg("✅ Firebase-এ মোট "+count+"টি প্রশ্ন আছে।", "#14532d");  
    })  
    .catch(function(e){ showQMsg("❌ Error: "+e.message, "#7f1d1d"); });  
}  
  
// ===== ADD QUESTION =====  
function addQuestion() {  
  var q = document.getElementById("q").value.trim();  
  var o1 = document.getElementById("o1").value.trim();  
  var o2 = document.getElementById("o2").value.trim();  
  var o3 = document.getElementById("o3").value.trim();  
  var o4 = document.getElementById("o4").value.trim();  
  var correct = parseInt(document.getElementById("correct").value); 
 var subject = document.getElementById("subject").value;
  if (!q||!o1||!o2||!o3||!o4) { alert("সব field পূরণ করো!"); return; }  
  
  showQMsg("⏳ Save হচ্ছে...", "#1e3a5f");  
  
  fetch(DB+"/questions.json", {  
    method: "POST",  
    headers: {"Content-Type":"application/json"},  
    body: JSON.stringify({
  subject: subject,
  q: q,
  a: [o1,o2,o3,o4],
  correct: correct
    })
  })
  .then(function(r){ return r.json(); })  
  .then(function(data){  
    if (data.error) {  
      showQMsg("❌ Error: "+data.error, "#7f1d1d");  
    } else {  
      ["q","o1","o2","o3","o4"].forEach(function(id){ document.getElementById(id).value=""; });  
      loadQCount();  
    }  
  })  
  .catch(function(e){ showQMsg("❌ Error: "+e.message, "#7f1d1d"); });  
}  
  function bulkImport(){

  var txt = document.getElementById("bulkData").value.trim();

  if(!txt){
    alert("JSON Paste করো!");
    return;
  }

  try{

    var questions = JSON.parse(txt);

    var requests = [];

    Object.values(questions).forEach(function(q){

      requests.push(
        fetch(DB+"/questions.json",{
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify(q)
        })
      );

    });

    Promise.all(requests)
    .then(function(){

      alert("✅ সব প্রশ্ন Save হয়েছে");

      document.getElementById("bulkData").value="";

      loadQCount();

    });

  }catch(e){

    alert("❌ Invalid JSON");

  }

   }
// ===== CLEAR =====  
function clearAllQuestions() {  
  if (!confirm("সব প্রশ্ন মুছে ফেলবে?")) return;  
  fetch(DB+"/questions.json", {method:"DELETE"})  
    .then(function(){ showQMsg("🗑 সব প্রশ্ন মুছে গেছে।", "#7f1d1d"); })  
    .catch(function(e){ showQMsg("❌ Error: "+e.message, "#7f1d1d"); });  
}  
  
// ===== STUDENT LOGIN =====  
function studentLogin() {  
  student = document.getElementById("studentName").value.trim();  
  sClass = document.getElementById("studentClass").value.trim();  
  if (!student||!sClass) { alert("নাম ও ক্লাস লেখো!"); return; }  
  
  fetch(DB+"/questions.json")  
    .then(function(r){ return r.json(); })  
    .then(function(data){  
      if (!data) { alert("❌ কোনো প্রশ্ন নেই! Teacher আগে প্রশ্ন add করুক।"); return; }  
      var examSubject = document.getElementById("examSubject").value;

if(examSubject === "All Subject"){
    examQuestions = Object.values(data);
} else {
    examQuestions = Object.values(data).filter(function(q){
        return q.subject === examSubject;
    });
}

if(examQuestions.length === 0){
    alert("এই Subject এর কোনো প্রশ্ন নেই!");
    return;
}

startExam();
    })  
    .catch(function(e){ alert("❌ Error: "+e.message); });  
}  
  
// ===== START EXAM =====  
function startExam() {  
  submitted = false;  
  warn = 0;  
  
  examQuestions = examQuestions.sort(function(){  
    return Math.random() - 0.5;  
  });  
  
  var html = "";  
  
  examQuestions.forEach(function(x,i){  
  
    html += '<div class="card"><p><strong>'+(i+1)+'. '+x.q+'</strong></p>';  
  
    var options = x.a.map(function(opt, idx){  
      return {  
        text: opt,  
        originalIndex: idx  
      };  
    });  
  
    options.sort(function(){  
      return Math.random() - 0.5;  
    });  
  
    options.forEach(function(o){  
      html += '<label class="radio-label">';  
      html += '<input type="radio" name="q'+i+'" value="'+o.originalIndex+'"> ';  
      html += o.text;  
      html += '</label>';  
    });  
  
    html += '</div>';  
  });  
  
  document.getElementById("quiz").innerHTML = html;  
  document.getElementById("warnDiv").innerHTML = "";  
  
  show("page3");  
  
  timeLeft = examQuestions.length * 60;  
  totalTime = timeLeft;  
  
  if (timerInterval) clearInterval(timerInterval);  
  
  timerInterval = setInterval(function(){  
  
    timeLeft--;  
  
    var m = Math.floor(timeLeft/60);  
    var s = timeLeft%60;  
  
    document.getElementById("timer").innerText =  
      "⏱ " + m + ":" + (s<10?"0":"") + s;  
  
    var p = (timeLeft/totalTime)*100;  
  
    document.getElementById("progress").style.width = p + "%";  
  
    if (p < 30){  
      document.getElementById("progress").style.background = "#ef4444";  
    } else {  
      document.getElementById("progress").style.background = "#22c55e";  
    }  
  
    if(timeLeft <= 0){  
      submitExam();  
    }  
  
  },1000);  
}  
  
  
// ===== ANTI CHEAT =====  
document.addEventListener("visibilitychange", function(){  
  if (document.hidden && !submitted && timerInterval) {  
    warn++;  
    document.getElementById("warnDiv").innerHTML =  
      '<div class="warn">⚠️ সতর্কতা '+warn+'/3 — বারবার করলে Exam বাতিল!</div>';  
    if (warn>=3) submitExam();  
  }  
});  
document.addEventListener("contextmenu", function(e){ e.preventDefault(); });  
document.addEventListener("copy", function(e){ e.preventDefault(); });  
  
// ===== SUBMIT =====

  var score = 0;

 var answered = 0;

 var rankText = "";

fetch(DB+"/results.json")

  var grade =  
    percent>=80?"A+":

  badge = "📚 KEEP LEARNING";

var examSubject =
document.getElementById("examSubject").value;

fetch(DB+"/results.json",{

document.getElementById("result").innerHTML =  
  '<div class="card" style="text-align:center;">'+

  '<h2>RESULT</h2>'+  
 '<div id="rankBox">🏆 Rank: Loading...</div>'+

  '<p>🏫 Class '+sClass+'</p>'+
 '<p>📚 Total Questions: '+examQuestions.length+'</p>'+
 '<p>🏅 Badge: '+badge+'</p>'+
 '<p>📝 Answered: '+answered+'/'+examQuestions.length+'</p>'+
 '<p>📚 Subject: '+examSubject+'</p>'+
 '<p>🕒 '+new Date().toLocaleString()+'</p>'+

// ===== LEADERBOARD =====  
function loadLeaderboard() {

  fetch(DB + "/results.json")
    .then(r => r.json())
    .then(function(data){

      if (!data) {
        document.getElementById("board").innerHTML = "কোনো result নেই।";
        return;
      }

      var subject = document.getElementById("examSubject").value;
      var results = Object.values(data);

      if (subject !== "All Subject") {
        results = results.filter(x => x.subject === subject);
      }

      results.sort((a,b) => b.percent - a.percent);

      var html = results.slice(0,10).map(function(d,i){
        return `
          <div class="card">
            🏅 ${i+1}. <b>${d.name}</b> (${d.class})<br>
            📚 ${d.subject}<br>
            📊 ${d.percent}% | ${d.grade}
          </div>
        `;
      }).join("");

      document.getElementById("board").innerHTML = html;
    });
}


// ===== ALL RESULTS =====
function loadResults() {

  fetch(DB + "/results.json")
    .then(function(r){ return r.json(); })
    .then(function(data){

      if (!data) {
        document.getElementById("allResults").innerHTML =
        "<div class='card'>কোনো Result নেই</div>";
        return;
      }
var search =
(document.getElementById("searchResult")?.value || "")
.toLowerCase();
      var html = "";
      var results = Object.values(data).reverse();

      results.forEach(function(r){
       if(search &&
!r.name.toLowerCase().includes(search)){
  return;
       }

        html += `
          <div class="card">
            <b>👤 ${r.name}</b><br>
            🏫 Class: ${r.class}<br>
            📚 Subject: ${r.subject}<br>
            📊 Score: ${r.score}/${r.total}<br>
            🎯 ${r.percent}%<br>
            🏆 Grade: ${r.grade}<br>
            🕒 ${r.time}
          </div>
        `;
      });

      document.getElementById("allResults").innerHTML = html;
    });
}
  
//=====load Hallo fame====  
 function loadHallOfFame() {

  fetch(DB+"/results.json")
    .then(function(r){
      return r.json();
    })
    .then(function(data){

      if(!data){
        document.getElementById("hallOfFame").innerHTML =
        "কোনো Legend নেই";
        return;
      }

      var subject =
      document.getElementById("examSubject").value;

      var legends = Object.values(data);

      if(subject !== "All Subject"){
        legends = legends.filter(function(x){
          return x.subject === subject;
        });
      }

      legends = legends.filter(function(x){
        return x.percent >= 90;
      });

      legends.sort(function(a,b){
        return b.percent - a.percent;
      });

      if(legends.length === 0){
        document.getElementById("hallOfFame").innerHTML =
        "এখনো কোনো Legend নেই 👑";
        return;
      }

      var html = "";

      legends.slice(0,10).forEach(function(x){

        html +=
          '<div class="card">' +
          '👑 <strong>'+x.name+'</strong> ('+x.class+')' +
          '<br>📚 '+x.subject +
          '<br>🏆 '+x.percent+'% | '+x.grade +
          '</div>';

      });

      document.getElementById("hallOfFame").innerHTML = html;

    });
 }
  
   
  document.getElementById("questionList").innerHTML = html;

});

      }

        var q = data[key];

        if(!q || !q.q) return; 

if(
  search &&
  !q.q.toLowerCase().includes(search)
){
  return;
}
        ){
          return;
        }

        html +=
        '<div class="card">' +
        '<b>📚 ' + (q.subject || "No Subject") + '</b><br>' +
        '❓ ' + q.q + '<br><br>' +

        '<button class="btn-yellow" onclick="editQuestion(\''+key+'\')">✏ Edit</button> ' +

        '<button class="btn-red" onclick="deleteQuestion(\''+key+'\')">🗑 Delete</button>' +

        '</div>';

      });

      document.getElementById("questionList").innerHTML = html;

    })
    .catch(function(error){

      document.getElementById("questionList").innerHTML =
      "<div class='card'>❌ Error Loading Questions</div>";

      console.log(error);

    });

}

function deleteQuestion(id){

  if(!confirm("Question delete করবে?")){
    return;
  }

  fetch(DB + "/questions/" + id + ".json",{
    method:"DELETE"
  })
  .then(function(){
    loadQuestions();
    loadQCount();
  });

}


function editQuestion(id){

  fetch(DB + "/questions/" + id + ".json")
    .then(function(r){
      return r.json(); 
    })
    .then(function(oldData){

      if(!oldData){
        alert("❌ Question পাওয়া যায়নি");
        return;
      }

      var newQ = prompt(
        "নতুন প্রশ্ন লেখো:",
        oldData.q
      );

      if(newQ === null) return;

      newQ = newQ.trim();

      if(newQ === ""){
        alert("❌ প্রশ্ন খালি রাখা যাবে না");
        return;
      }

      oldData.q = newQ;

      fetch(DB + "/questions/" + id + ".json",{
        method:"PUT",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify(oldData)
      })
      .then(function(){
        alert("✅ Question Updated");
        loadQuestions();
      })
      .catch(function(error){
        alert("❌ Error: " + error.message);
      });

    })
    .catch(function(error){
      alert("❌ Error: " + error.message);
    });

}
 window.onload = function(){
  loadQuestions();
  loadLeaderboard();
  loadResults();
};


// ===== AUTO REFRESH =====
setInterval(function(){
  loadLeaderboard();
  loadResults();
}, 5000);

</script>
