<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Exam System</title>

<style>
body{
  font-family: Arial;
  background:#050816;
  color:white;
  padding:20px;
}
.container{
  max-width:900px;
  margin:auto;
  background:#0f172a;
  padding:20px;
  border-radius:12px;
}
input, select{
  width:95%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}
button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
#timer{
  font-size:18px;
  font-weight:bold;
  color:#f87171;
}
#progressBar{
  width:100%;
  height:10px;
  background:#334155;
}
#progress{
  height:10px;
  background:#22c55e;
  width:0%;
}
h2{text-align:center;}
</style>
</head>

<body>

<div class="container">

<h2>🏫 Exam System</h2>

<div id="studentBox">
<h3>Student Login</h3>
<input id="studentName" placeholder="Name">
<input id="studentClass" placeholder="Class">
<button onclick="studentLogin()">Start Exam</button>
</div>

<div id="loginBox" style="display:none;">
<h3>Teacher Login</h3>
<input id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">

<h3>Admin Panel</h3>

<input id="q" placeholder="Question">
<input id="o1" placeholder="Option 1">
<input id="o2" placeholder="Option 2">
<input id="o3" placeholder="Option 3">
<input id="o4" placeholder="Option 4">

<select id="correct">
<option value="0">Option 1</option>
<option value="1">Option 2</option>
<option value="2">Option 3</option>
<option value="3">Option 4</option>
</select>

<button onclick="addQuestion()">Add Question</button>
<button onclick="startExam()">Start Exam</button>

<hr>

<div id="timer">Time: 60</div>
<div id="progressBar"><div id="progress"></div></div>

<div id="quiz"></div>

<button onclick="submitExam()">Submit</button>

<h3 id="result"></h3>

</div>

</div>

<script>
/* =======================
   DEMO QUESTIONS (SAFE)
======================= */
let questions = [
  {
    q: "2 + 2 কত?",
    a: ["1","2","3","4"],
    correct: 3
  },
  {
    q: "বাংলাদেশের রাজধানী কোনটি?",
    a: ["ঢাকা","চট্টগ্রাম","রাজশাহী","খুলনা"],
    correct: 0
  }
];

let student = "";
let className = "";
let time = 60;
let timer;

/* =======================
   LOGIN
======================= */
function studentLogin(){
student = document.getElementById("studentName").value;
className = document.getElementById("studentClass").value;

if(!student || !className){
  alert("Fill all fields");
  return;
}

document.getElementById("studentBox").style.display="none";
document.getElementById("loginBox").style.display="block";
}

/* =======================
   ADMIN LOGIN
======================= */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
}
else alert("Wrong login");
}

/* =======================
   ADD QUESTION
======================= */
function addQuestion(){
questions.push({
  q: document.getElementById("q").value,
  a: [
    document.getElementById("o1").value,
    document.getElementById("o2").value,
    document.getElementById("o3").value,
    document.getElementById("o4").value
  ],
  correct: parseInt(document.getElementById("correct").value)
});

alert("Question Added!");
}

/* =======================
   START EXAM
======================= */
function startExam(){

if(questions.length === 0){
  alert("No questions found");
  return;
}

document.getElementById("quiz").innerHTML="";

questions.forEach((x,i)=>{
document.getElementById("quiz").innerHTML += `
<div class="card">
<h4>${i+1}. ${x.q}</h4>
${x.a.map((o,j)=>
`<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`
).join("")}
</div>`;
});

clearInterval(timer);
time = 60;

timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="Time: "+time;
document.getElementById("progress").style.width=(time/60)*100+"%";

if(time<=0) submitExam();
},1000);
}

/* =======================
   SUBMIT
======================= */
function submitExam(){
clearInterval(timer);

let score=0;

questions.forEach((x,i)=>{
let ans=document.querySelector(`input[name=q${i}]:checked`);
if(ans && parseInt(ans.value)===x.correct) score++;
});

let percent=Math.round((score/questions.length)*100);

document.getElementById("result").innerHTML=
`<div class="card">
🎓 Name: ${student}<br>
🏫 Class: ${className}<br>
📊 Score: ${score}/${questions.length}<br>
📈 Result: ${percent}%
</div>`;
}
</script>

</body>
</html>
