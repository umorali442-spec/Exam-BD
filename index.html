<!DOCTYPE html>
<html>
<head>
<title>Exam BD Final</title>

<style>
body{
    font-family: Arial;
    background:#eef2f3;
    text-align:center;
}

.container{
    width:380px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
}

button{
    padding:10px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

.question{
    text-align:left;
    margin:10px 0;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login">
    <h2>Exam BD</h2>

    <input type="text" id="name" placeholder="Name">
    <input type="text" id="id" placeholder="ID">

    <button onclick="start()">Start Exam</button>
</div>

<!-- EXAM -->
<div id="exam" style="display:none">

    <h2>MCQ Exam</h2>

    <p id="user"></p>
    <h3 id="time">60</h3>

    <div id="quiz"></div>

    <button onclick="submit()">Submit</button>

    <h2 id="result"></h2>
</div>

</div>

<script>

// ================= QUESTIONS =================
let questions = [
    {q:"HTML full form?", options:["Hyper Text Markup Language","Home Tool","Hello Text"], answer:0},
    {q:"CSS used for?", options:["Styling","Cooking","Driving"], answer:0},
    {q:"JS is?", options:["Language","Car","Food"], answer:0},
    {q:"RAM is?", options:["Memory","Mouse","Screen"], answer:0}
];

let time = 60;
let timer;

// ================= START =================
function start(){

    let name = document.getElementById("name").value;
    let id = document.getElementById("id").value;

    if(!name || !id){
        alert("Fill Name & ID");
        return;
    }

    localStorage.setItem("name",name);
    localStorage.setItem("id",id);

    document.getElementById("login").style.display="none";
    document.getElementById("exam").style.display="block";

    load();
    startTimer();
}

// ================= LOAD =================
function load(){

    document.getElementById("user").innerText =
    "Name: "+localStorage.getItem("name")+" | ID: "+localStorage.getItem("id");

    let quiz=document.getElementById("quiz");
    quiz.innerHTML="";

    questions.forEach((q,i)=>{

        let div=document.createElement("div");
        div.className="question";

        let html="<p>"+q.q+"</p>";

        q.options.forEach((o,j)=>{
            html+=`
            <label>
            <input type="radio" name="q${i}" value="${j}">
            ${o}
            </label><br>`;
        });

        div.innerHTML=html;
        quiz.appendChild(div);
    });
}

// ================= TIMER =================
function startTimer(){

    timer=setInterval(()=>{

        time--;
        document.getElementById("time").innerText=time;

        if(time<=0){
            submit();
        }

    },1000);
}

// ================= SUBMIT =================
function submit(){

    clearInterval(timer);

    let score=0;

    questions.forEach((q,i)=>{

        let ans=document.querySelector(`input[name="q${i}"]:checked`);

        if(ans && parseInt(ans.value)===q.answer){
            score++;
        }

    });

    document.getElementById("quiz").style.display="none";

    document.getElementById("result").innerText=
    "Score: "+score+" / "+questions.length;
}

</script>

</body>
</html>
