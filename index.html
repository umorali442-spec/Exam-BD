<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam BD Pro</title>

<style>
body{
  font-family: Arial;
  background:#f4f4f4;
  padding:20px;
}
.container{
  background:white;
  padding:20px;
  border-radius:10px;
  max-width:700px;
  margin:auto;
}
.q{
  margin-bottom:20px;
  padding:10px;
  border-bottom:1px solid #ddd;
}
button{
  padding:10px 20px;
  background:green;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
}
#timer{
  font-size:20px;
  color:red;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>📘 Exam BD Pro</h2>
<div id="timer">Time: 60</div>

<div id="quiz"></div>

<button onclick="submitExam()">Submit Exam</button>

<h3 id="result"></h3>

</div>

<script>

// TIMER
let time = 60;
let timer = setInterval(()=>{
  time--;
  document.getElementById("timer").innerText = "Time: " + time + "s";

  if(time <= 0){
    submitExam();
  }
},1000);

// QUESTIONS
const questions = [
  {
    q: "What is 2 + 2?",
    a: ["3","4","5","6"],
    correct: 1
  },
  {
    q: "Capital of Bangladesh?",
    a: ["Dhaka","Chittagong","Khulna","Rajshahi"],
    correct: 0
  },
  {
    q: "HTML stands for?",
    a: ["Hyper Text Markup Language","Home Tool Markup Language","Hot Mail","None"],
    correct: 0
  }
];

// LOAD QUIZ
function loadQuiz(){
  let html = "";

  questions.forEach((x,i)=>{
    html += `<div class="q">
      <h4>${i+1}. ${x.q}</h4>
      ${x.a.map((opt,j)=>
        `<label>
          <input type="radio" name="q${i}" value="${j}">
          ${opt}
        </label><br>`
      ).join("")}
    </div>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

// SUBMIT
function submitExam(){
  clearInterval(timer);

  let score = 0;

  questions.forEach((x,i)=>{
    let ans = document.querySelector(`input[name=q${i}]:checked`);
    if(ans && parseInt(ans.value) === x.correct){
      score++;
    }
  });

  document.getElementById("result").innerHTML =
    "🎯 Your Score: " + score + " / " + questions.length;
}

// INIT
loadQuiz();

</script>

</body>
</html>
