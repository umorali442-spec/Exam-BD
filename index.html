<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>School Exam System</title><style>
body{
  font-family: Arial;
  background:#050816;
  color:white;
  padding:20px;
}
.container{
  max-width:900px;
  margin:auto;
  background:#0f172a;
  padding:20px;
  border-radius:12px;
}
input, select{
  width:95%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}
button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
#timer{
  font-size:18px;
  font-weight:bold;
  color:#f87171;
}
#progressBar{
  width:100%;
  height:10px;
  background:#334155;
}
#progress{
  height:10px;
  background:#22c55e;
}
h2{text-align:center;}
</style></head><body><div class="container"><h2>🏫 Exam System</h2><div id="studentBox">
<h3>Student Login</h3>
<input id="studentName" placeholder="Name">
<input id="studentClass" placeholder="Class">
<button onclick="studentLogin()">Start Exam</button>
</div><div id="loginBox" style="display:none;">
<h3>Teacher Login</h3>
<input id="user">
<input type="password" id="pass">
<button onclick="login()">Login</button>
</div><div id="panel" style="display:none;"><h3>Admin Panel</h3><input id="q" placeholder="Question">
<input id="o1" placeholder="Option 1">
<input id="o2" placeholder="Option 2">
<input id="o3" placeholder="Option 3">
<input id="o4" placeholder="Option 4"><select id="correct">
<option value="0">Option 1</option>
<option value="1">Option 2</option>
<option value="2">Option 3</option>
<option value="3">Option 4</option>
</select><button onclick="addQuestion()">Add Question</button>
<button onclick="startExam()">Start Exam</button>

<hr><div id="timer">Time: 60</div>
<div id="progressBar"><div id="progress"></div></div><div id="quiz"></div><button onclick="submitExam()">Submit</button>

<h3 id="result"></h3><div id="board"></div></div></div><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script><script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questions = [];
let student = "";
let className = "";
let time = 60;
let timer;

function studentLogin(){
student = document.getElementById("studentName").value;
className = document.getElementById("studentClass").value;

if(!student || !className){
  alert("Fill all");
  return;
}

document.getElementById("studentBox").style.display="none";
document.getElementById("loginBox").style.display="block";
}

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
loadQuestions();
}else alert("Wrong login");
}

function addQuestion(){
db.ref("questions").push({
q: q.value,
a: [o1.value,o2.value,o3.value,o4.value],
correct: parseInt(correct.value)
});
alert("Saved");
}

function loadQuestions(){
db.ref("questions").on("value",snap=>{
questions=[];
snap.forEach(d=>questions.push(d.val()));
});
}

function startExam(){

if(questions.length===0){
alert("No questions found");
return;
}

let html="";

questions.forEach((x,i)=>{
html += `
<div class="card">
<h4>${i+1}. ${x.q}</h4>
${x.a.map((o,j)=>
`<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`
).join("")}
</div>`;
});

document.getElementById("quiz").innerHTML=html;

timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="Time: "+time;
document.getElementById("progress").style.width=(time/60)*100+"%";
if(time<=0) submitExam();
},1000);
}

function submitExam(){
clearInterval(timer);

let score=0;

questions.forEach((x,i)=>{
let ans=document.querySelector(`input[name=q${i}]:checked`);
if(ans && ans.value==x.correct) score++;
});

let percent=Math.round((score/questions.length)*100);

db.ref("results").push({
name: student,
class: className,
score,
percent,
time: new Date().toLocaleString()
});

document.getElementById("result").innerHTML=
`<div class="card">
🎓 ${student}<br>
🏫 ${className}<br>
📊 ${score}/${questions.length}<br>
📈 ${percent}%
</div>`;
}

</script></body>
</html>
