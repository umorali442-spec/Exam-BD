<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam BD Pro Full System</title>

<style>
body{
  font-family: Arial;
  background:#eef6ff;
  padding:20px;
}

.container{
  max-width:850px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
}

input, select{
  padding:10px;
  margin:5px 0;
  width:90%;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

#loginBtn{background:#007bff;color:white;}
#addBtn{background:#28a745;color:white;}
#startBtn{background:#ff9800;color:white;}
#submitBtn{background:#dc3545;color:white;}

.q{
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  background:#f9f9f9;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#timer{
  color:red;
  font-weight:bold;
  font-size:18px;
}

h2{
  text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h2>📘 Exam BD Pro System</h2>

<!-- 👨‍🎓 STUDENT LOGIN -->
<div id="studentBox">
  <h3>👨‍🎓 Student Login</h3>
  <input type="text" id="studentName" placeholder="Enter Your Name"><br>
  <button onclick="studentLogin()">Start Exam</button>
</div>

<!-- 🔐 ADMIN LOGIN -->
<div id="loginBox" style="display:none;">
  <h3>🔐 Admin Login</h3>
  <input type="text" id="user" placeholder="Username"><br>
  <input type="password" id="pass" placeholder="Password"><br>
  <button id="loginBtn" onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<!-- ADMIN PANEL -->
<div id="panel" style="display:none;">

<h3>🧑‍🏫 Add Question</h3>

<input type="text" id="q" placeholder="Question"><br>
<input type="text" id="o1" placeholder="Option 1"><br>
<input type="text" id="o2" placeholder="Option 2"><br>
<input type="text" id="o3" placeholder="Option 3"><br>
<input type="text" id="o4" placeholder="Option 4"><br>

<select id="correct">
  <option value="0">Option 1</option>
  <option value="1">Option 2</option>
  <option value="2">Option 3</option>
  <option value="3">Option 4</option>
</select><br>

<button id="addBtn" onclick="addQuestion()">Add Question</button>
<button id="startBtn" onclick="startExam()">Start Exam</button>

<hr>

<div id="timer">Time: 60</div>

<!-- PROGRESS BAR -->
<div style="width:100%;background:#ddd;border-radius:10px;margin:10px 0;">
  <div id="progress" style="height:10px;width:100%;background:#4caf50;border-radius:10px;"></div>
</div>

<div id="quiz"></div>

<button id="submitBtn" onclick="submitExam()">Submit Exam</button>

<h3 id="result"></h3>

</div>

</div>

<script>

let questions = JSON.parse(localStorage.getItem("questions")) || [
  {q:"2+2=?",a:["3","4","5","6"],correct:1},
  {q:"Capital of BD?",a:["Dhaka","Delhi","Khulna","Paris"],correct:0}
];

let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

let time=60;
let totalTime=60;
let timer;

let currentStudent="";
let currentUser="";
let warningCount=0;

// 👨‍🎓 STUDENT LOGIN
function studentLogin(){
  let name=document.getElementById("studentName").value;

  if(name.trim()===""){
    alert("Enter your name!");
    return;
  }

  currentStudent=name;

  document.getElementById("studentBox").style.display="none";
  document.getElementById("loginBox").style.display="block";
}

// 🔐 ADMIN LOGIN
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    currentUser=u;
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="block";
  }else{
    document.getElementById("msg").innerText="❌ Wrong login!";
  }
}

// ADD QUESTION
function addQuestion(){

  let q=document.getElementById("q").value;
  let o1=document.getElementById("o1").value;
  let o2=document.getElementById("o2").value;
  let o3=document.getElementById("o3").value;
  let o4=document.getElementById("o4").value;
  let c=parseInt(document.getElementById("correct").value);

  questions.push({q:q,a:[o1,o2,o3,o4],correct:c});

  localStorage.setItem("questions",JSON.stringify(questions));

  alert("Question Added!");
}

// START EXAM
function startExam(){

  let html="";

  questions.forEach((x,i)=>{
    html+=`
    <div class="q">
      <h4>${i+1}. ${x.q}</h4>
      ${x.a.map((o,j)=>
        `<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`
      ).join("")}
    </div>`;
  });

  document.getElementById("quiz").innerHTML=html;

  timer=setInterval(()=>{
    time--;

    document.getElementById("timer").innerText="Time: "+time+"s";

    let percent=(time/totalTime)*100;
    document.getElementById("progress").style.width=percent+"%";

    if(time<=0) submitExam();
  },1000);
}

// 🛡️ ANTI CHEAT
document.addEventListener("visibilitychange", function(){
  if(document.hidden){
    warningCount++;
    alert("⚠️ Tab switch detected!");

    if(warningCount>=3){
      alert("❌ Exam auto submitted!");
      submitExam();
    }
  }
});

document.addEventListener("contextmenu", e=>{
  e.preventDefault();
});

document.addEventListener("copy", e=>{
  e.preventDefault();
});

// SUBMIT + RANK
function submitExam(){
  clearInterval(timer);

  let score=0;

  questions.forEach((x,i)=>{
    let ans=document.querySelector(`input[name=q${i}]:checked`);
    if(ans && parseInt(ans.value)===x.correct){
      score++;
    }
  });

  let percent=Math.round((score/questions.length)*100);

  document.getElementById("result").innerHTML=
  `
  <div style="padding:15px;background:#e8f5e9;border-radius:10px;">
  🎯 Score: ${score}/${questions.length}<br>
  📊 Percentage: ${percent}%<br>
  👤 Student: ${currentStudent}
  </div>
  `;

  leaderboard.push({
    name: currentStudent,
    score: percent
  });

  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard = leaderboard.slice(0,5);

  localStorage.setItem("leaderboard",JSON.stringify(leaderboard));

  showRank();
}

// SHOW RANK
function showRank(){
  let html="<h3>🏆 Top 5 Rank</h3>";

  leaderboard.forEach((x,i)=>{
    html+=`<p>${i+1}. ${x.name} - ${x.score}%</p>`;
  });

  document.getElementById("result").innerHTML += html;
}

</script>

</body>
</html>
